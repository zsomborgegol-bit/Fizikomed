<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="70%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2238"/>
    </radialGradient>
    <radialGradient id="circle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="220" fill="url(#circle-glow)"/>
  <circle cx="150"  cy="500" r="180" fill="url(#circle-glow)"/>
  <circle cx="950"  cy="520" r="140" fill="#7dd3fc" fill-opacity="0.04"/>

  <!-- Decorative lines -->
  <line x1="80" y1="60" x2="1120" y2="60" stroke="#7dd3fc" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#7dd3fc" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Spine / logo icon (simplified) -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="8" height="220" rx="4" fill="#7dd3fc" opacity="0.7"/>
    <rect x="-16" y="20" width="40" height="10" rx="5" fill="#7dd3fc" opacity="0.5"/>
    <rect x="-16" y="50" width="40" height="10" rx="5" fill="#7dd3fc" opacity="0.5"/>
    <rect x="-16" y="80" width="40" height="10" rx="5" fill="#7dd3fc" opacity="0.5"/>
    <rect x="-16" y="110" width="40" height="10" rx="5" fill="#7dd3fc" opacity="0.5"/>
    <rect x="-16" y="140" width="40" height="10" rx="5" fill="#7dd3fc" opacity="0.5"/>
    <rect x="-16" y="170" width="40" height="10" rx="5" fill="#7dd3fc" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="160" y="230" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="96" font-weight="800" fill="#7dd3fc" letter-spacing="-2">Fizikomed</text>

  <!-- Tagline -->
  <text x="160" y="310" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="40" font-weight="400" fill="#f5efe6" opacity="0.9">Mozgás és Masszázsterápia</text>

  <!-- Divider -->
  <rect x="160" y="340" width="120" height="4" rx="2" fill="#e07b39"/>

  <!-- Subtitle -->
  <text x="160" y="400" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="600" fill="#f5efe6" opacity="0.75">Deli Gabriella – Gyógymasszőr &amp; Fizioterapeuta</text>

  <!-- Location -->
  <text x="160" y="450" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="400" fill="#7dd3fc" opacity="0.7">Budapest, VI. kerület · Andrássy út 10.</text>

  <!-- Stats -->
  <g transform="translate(160, 500)">
    <rect x="0" y="0" width="160" height="56" rx="10" fill="#ffffff" fill-opacity="0.06"/>
    <text x="80" y="22" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="800" fill="#7dd3fc">25+</text>
    <text x="80" y="44" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f5efe6" opacity="0.7">Év tapasztalat</text>

    <rect x="176" y="0" width="160" height="56" rx="10" fill="#ffffff" fill-opacity="0.06"/>
    <text x="256" y="22" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="800" fill="#7dd3fc">1000+</text>
    <text x="256" y="44" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f5efe6" opacity="0.7">Kezelt páciens</text>

    <rect x="352" y="0" width="160" height="56" rx="10" fill="#ffffff" fill-opacity="0.06"/>
    <text x="432" y="22" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="800" fill="#7dd3fc">14+</text>
    <text x="432" y="44" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#f5efe6" opacity="0.7">Terápiás módszer</text>
  </g>

  <!-- Right decorative element -->
  <g transform="translate(900, 180)" opacity="0.15">
    <circle cx="150" cy="150" r="140" stroke="#7dd3fc" stroke-width="2" fill="none"/>
    <circle cx="150" cy="150" r="100" stroke="#7dd3fc" stroke-width="1.5" fill="none"/>
    <circle cx="150" cy="150" r="60"  stroke="#7dd3fc" stroke-width="1" fill="none"/>
  </g>

  <!-- Domain -->
  <text x="1120" y="600" text-anchor="end" font-family="sans-serif" font-size="20" fill="#f5efe6" opacity="0.4">fizikomed.com</text>
</svg>
