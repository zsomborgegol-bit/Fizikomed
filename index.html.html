                {lang === "hu" ? "Írjon nekünk" : "Write to us"}
              </h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div>
                  <label style={{ fontSize: 15, fontWeight: 600, color: "#475569", display: "block", marginBottom: 7 }}>{t.contact.formName}</label>
                  <input className="input-field" placeholder={lang === "hu" ? "Teljes neve" : "Your full name"} />
                </div>
                <div>
                  <label style={{ fontSize: 15, fontWeight: 600, color: "#475569", display: "block", marginBottom: 7 }}>{t.contact.formEmail}</label>
                  <input className="input-field" type="email" placeholder={lang === "hu" ? "pelda@email.com" : "example@email.com"} />
                </div>
                <div>
                  <label style={{ fontSize: 15, fontWeight: 600, color: "#475569", display: "block", marginBottom: 7 }}>{t.contact.phone}</label>
                  <input className="input-field" type="tel" placeholder="+36 ..." />
                </div>
                <div>
                  <label style={{ fontSize: 15, fontWeight: 600, color: "#475569", display: "block", marginBottom: 7 }}>{t.contact.formMsg}</label>
                  <textarea className="input-field" rows={5} placeholder={lang === "hu" ? "Miben segíthetünk?" : "How can we help?"} style={{ resize: "vertical" }} />
                </div>
                <button className="btn-primary" style={{ width: "100%", marginTop: 10, fontSize: 18 }}>
                  {t.contact.formSend} →
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{ background: "linear-gradient(165deg, #0f2847, #1a3f6f)", padding: "50px 24px 30px", color: "white" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 20, paddingBottom: 30, borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
            <div style={{ cursor: "pointer" }} onClick={() => scrollTo("hero")}>
              <img src={LOGO_ORIG} alt="Fizikomed" style={{ height: 50, objectFit: "contain", filter: "brightness(10)" }} />
            </div>
            <div style={{ display: "flex", gap: 28 }}>
              <span style={{ color: "rgba(255,255,255,0.6)", cursor: "pointer", fontSize: 16, fontWeight: 500 }} onClick={() => scrollTo("about")}>{t.nav.about}</span>
              <span style={{ color: "rgba(255,255,255,0.6)", cursor: "pointer", fontSize: 16, fontWeight: 500 }} onClick={() => scrollTo("services")}>{t.nav.services}</span>
              <span style={{ color: "rgba(255,255,255,0.6)", cursor: "pointer", fontSize: 16, fontWeight: 500 }} onClick={() => scrollTo("contact")}>{t.nav.contact}</span>
            </div>
          </div>
          <div style={{ paddingTop: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
            <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>© 2025 Fizikomed. {t.footer.rights}</p>
            <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
              <a href="tel:+36707709053" style={{ color: "rgba(255,255,255,0.5)", fontSize: 15, textDecoration: "none" }}>+36 70 770 9053</a>
              <span style={{ color: "rgba(255,255,255,0.2)" }}>|</span>
              <a href="mailto:testkepzes@gmail.com" style={{ color: "rgba(255,255,255,0.5)", fontSize: 15, textDecoration: "none" }}>testkepzes@gmail.com</a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

    ReactDOM.render(React.createElement(Fizikomed), document.getElementById('root'));
  </script>
</body>
